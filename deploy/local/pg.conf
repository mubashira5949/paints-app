# from: https://pgtune.leopard.in.ua/?dbVersion=17&osType=mac&dbType=mixed&cpuNum=2&totalMemory=4&totalMemoryUnit=GB&connectionNum=50&hdType=ssd
# DB Version: 17
# OS Type: mac
# DB Type: oltp
# Total Memory (RAM): 4 GB
# CPUs num: 2
# Connections num: 50
# Data Storage: ssd

shared_preload_libraries = 'auto_explain,pg_stat_statements,pg_cron,pg_parquet,pg_trgm'

pg_stat_statements.track = all
pg_stat_statements.max = 10000
track_io_timing = on
max_connections = 50
shared_buffers = 1GB
effective_cache_size = 3GB
maintenance_work_mem = 256MB
checkpoint_completion_target = 0.9
wal_buffers = 16MB
default_statistics_target = 100
random_page_cost = 1.1
work_mem = 18078kB
huge_pages = off
min_wal_size = 2GB
max_wal_size = 8GB
checkpoint_timeout = 5min

commit_delay = 500
effective_io_concurrency = 200

# Background writer
bgwriter_lru_maxpages = 1000
bgwriter_lru_multiplier = 5.0

max_wal_senders = 10

max_parallel_workers_per_gather = 8

max_replication_slots = 10

lock_timeout = 45s
statement_timeout = 1min

# required for docker
listen_addresses = '*'
# Enable asynchronous commits for better throughput
synchronous_commit = off
# More aggressive autovacuum for message queue tables
autovacuum = on
autovacuum_max_workers = 1
autovacuum_work_mem = 1GB

# For high-turnover message tables
autovacuum_vacuum_scale_factor = 0.05    # Vacuum when 5% of table changes
autovacuum_analyze_scale_factor = 0.05   # Analyze when 5% of table changes
autovacuum_vacuum_cost_delay = 0
autovacuum_vacuum_cost_limit = 10000
autovacuum_vacuum_threshold = 100

auto_explain.log_nested_statements = on
auto_explain.log_min_duration = '10s'
auto_explain.log_analyze = 0
auto_explain.log_timing = 0
# auto_explain.log_format = json

cron.log_run = on
cron.log_statement = off
cron.max_running_jobs = 2

wal_level = logical

gin_fuzzy_search_limit = 5000
