version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_URL=http://localhost:3000
    ports:
      - "80:80"
      - "5173:80" # Maps local port 5173 to nginx 80 just in case you still want to use the classic port
    depends_on:
      - backend
    restart: unless-stopped
