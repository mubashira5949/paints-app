    get:
      tags: [Settings]
      summary: Active pack sizes (kg)
      responses:
        '200':
          description: Active pack sizes
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/PackSize' } }
    post:
      tags: [Settings]
      summary: Add or re-activate a pack size (Manager)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pack_size_kg]
              properties:
                pack_size_kg: { type: number, exclusiveMinimum: 0 }
      responses:
        '201':
          description: Added
          content:
            application/json:
              schema:
                type: object
                properties:
                  pack_size_kg: { type: number }

  /settings/pack-sizes/{kg}:
    parameters:
      - { in: path, name: kg, required: true, schema: { type: number, exclusiveMinimum: 0 } }
    delete:
      tags: [Settings]
      summary: Deactivate (soft) a pack size (Manager)
      responses:
        '200':
          description: Disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  pack_size_kg: { type: [number, string] }
                  is_active:    { type: boolean }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------- Purchase Orders ----------
  /purchase-orders:
    get:
