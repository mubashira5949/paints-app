        wastage_flagged:     { type: boolean }
        dilution_total_kg:   { type: [number, string] }
        dilution_flagged:    { type: boolean }
        operator:            { type: string }
        completed_at:        { type: [string, 'null'], format: date-time }
        resource_variances:  { type: array, items: { $ref: '#/components/schemas/ResourceActual' } }
        dilution_adjustments: { type: array, items: { $ref: '#/components/schemas/DilutionAdjustment' } }

    OperatorSummaryRow:
      type: object
      properties:
        operator_id:  { type: integer }
        operator:     { type: string }
        runs:         { type: [integer, string] }
        flagged_runs: { type: [integer, string] }
        wastage_kg:   { type: [number, string] }

# ============================================================================
# Paths
# ============================================================================

paths:
  # ---------- Auth ----------
  /auth/login:
    post:
      tags: [Auth]
      summary: Log in and receive a JWT
      description: |
        Requires `clientId` (UUID) per spec §2.2. First sign-in from an
        unrecognised device returns `403 device_pending_approval` and records
        a pending row in `user_devices`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Signed JWT
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /auth/set-password:
    post:
      tags: [Auth]
      summary: Set a new password (first-login / Manager-reset flow, spec §5)
      description: |
        Only succeeds when the target user is in the must-reset state
        (`password_hash IS NULL` or `password_reset_required = TRUE`). The
        same device-approval gate as `/auth/login` runs; on success returns
        a JWT just like `/auth/login`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier, new_password, clientId]
              properties:
                identifier:   { type: string, minLength: 1 }
                new_password: { type: string, minLength: 8, maxLength: 255 }
                clientId:     { type: string, format: uuid }
      responses:
        '200':
          description: Signed JWT
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /auth/public-key:
    get:
      tags: [Auth]
      summary: ES256 public key (PEM)
      security: []
      responses:
        '200':
          description: PEM-encoded public key
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicKeyResponse' }

  /users/{id}/reset-password:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post:
      tags: [Users]
      summary: Manager-triggered password reset (spec §5)
      description: Clears password_hash and sets password_reset_required. The user must set a new password on their next sign-in via `/auth/set-password`.
      responses:
        '200':
          description: Reset
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  user:    { type: object, properties: { id: { type: integer }, username: { type: string } } }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------- Users ----------
  /users:
    get:
      tags: [Users]
      summary: List users (Manager)
      responses:
        '200':
          description: All users
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/User' } }
    post:
      tags: [Users]
      summary: Create a new user (Manager)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateUserRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
