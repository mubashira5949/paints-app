      summary: List POs
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/IncludeArchived'
        - { in: query, name: status, schema: { $ref: '#/components/schemas/PoStatus' } }
        - { in: query, name: supplier_id, schema: { type: integer, minimum: 1 } }
      responses:
        '200':
          description: Page of POs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    properties:
                      items: { type: array, items: { $ref: '#/components/schemas/PurchaseOrderListItem' } }
    post:
      tags: [Purchase Orders]
      summary: Create a draft PO (Manager)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePORequest' }
      responses:
        '201': { $ref: '#/components/responses/Created' }

  /purchase-orders/{id}:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    get:
      tags: [Purchase Orders]
      summary: One PO with line items
      responses:
        '200': { description: PO, content: { application/json: { schema: { $ref: '#/components/schemas/PurchaseOrder' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Purchase Orders]
      summary: Update header (Manager)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PatchPORequest' }
      responses:
        '200': { $ref: '#/components/responses/Updated' }

  /purchase-orders/{id}/items:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post:
      tags: [Purchase Orders]
      summary: Add an item (Manager, only while draft)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/POItemInput' }
      responses:
        '201': { $ref: '#/components/responses/Created' }
        '409': { $ref: '#/components/responses/Conflict' }

  /purchase-orders/items/{itemId}:
    parameters:
      - { in: path, name: itemId, required: true, schema: { type: integer, minimum: 1 } }
    patch:
      tags: [Purchase Orders]
      summary: Update an item (Manager, only while draft)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PatchPOItemRequest' }
      responses:
        '200': { $ref: '#/components/responses/Updated' }
        '409': { $ref: '#/components/responses/Conflict' }
    delete:
      tags: [Purchase Orders]
      summary: Remove an item (Manager, only while draft)
      responses:
        '200': { $ref: '#/components/responses/Updated' }
        '409': { $ref: '#/components/responses/Conflict' }

  /purchase-orders/{id}/transition:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post:
      tags: [Purchase Orders]
      summary: Move through status state machine (Manager)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TransitionPORequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:     { type: integer }
                  status: { $ref: '#/components/schemas/PoStatus' }
        '409': { $ref: '#/components/responses/Conflict' }

  /purchase-orders/{id}/receive:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post:
      tags: [Purchase Orders]
      summary: Receive selected line items (Manager)
      description: |
        For each `resource` line: writes a `resource_stock_transactions` row
        (DDL trigger maintains weighted-avg cost). For each `finished_paint`
        line: writes supplier-source `finished_paint_packs` rows. When every
        line is fully received the PO auto-transitions to `received`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReceivePORequest' }
      responses:
        '200': { $ref: '#/components/responses/Updated' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }

  /purchase-orders/{id}/archive:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post: { tags: [Purchase Orders], summary: Archive (Manager), responses: { '200': { $ref: '#/components/responses/Updated' } } }

  /purchase-orders/{id}/restore:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post: { tags: [Purchase Orders], summary: Restore (Manager), responses: { '200': { $ref: '#/components/responses/Updated' } } }

  # ---------- Production ----------
  /production/requests:
    get:
      tags: [Production]
      summary: Operator queue (pending production requests)
      parameters:
        - { in: query, name: status, schema: { $ref: '#/components/schemas/ProductionRequestStatus' } }
      responses:
        '200':
          description: Requests
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/ProductionRequest' } }
    post:
      tags: [Production]
      summary: Create a manual production request (Manager)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateProductionRequestRequest' }
      responses:
        '201': { $ref: '#/components/responses/Created' }

  /production/requests/{id}:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    get:
      tags: [Production]
      summary: One request
      responses:
        '200': { description: Request, content: { application/json: { schema: { $ref: '#/components/schemas/ProductionRequest' } } } }
        '404': { $ref: '#/components/responses/NotFound' }

  /production/requests/{id}/cancel:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post: { tags: [Production], summary: Cancel a request (Manager), responses: { '200': { $ref: '#/components/responses/Updated' }, '404': { $ref: '#/components/responses/NotFound' } } }

  /production/runs:
    get:
      tags: [Production]
      summary: List production runs
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - { in: query, name: status, schema: { $ref: '#/components/schemas/ProductionRunStatus' } }
        - { in: query, name: variant_id, schema: { type: integer, minimum: 1 } }
        - { in: query, name: operator_id, schema: { type: integer, minimum: 1 } }
      responses:
        '200':
          description: Page of runs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    properties:
                      items: { type: array, items: { $ref: '#/components/schemas/ProductionRunListItem' } }
    post:
      tags: [Production]
      summary: Open a new production run
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRunRequest' }
      responses:
        '201': { $ref: '#/components/responses/Created' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }

  /production/runs/{id}:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    get:
      tags: [Production]
      summary: Full run detail (actuals + dilution + packs)
      responses:
        '200': { description: Run, content: { application/json: { schema: { $ref: '#/components/schemas/ProductionRun' } } } }
        '404': { $ref: '#/components/responses/NotFound' }

  /production/runs/{id}/start:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post:
      tags: [Production]
      summary: Move run from planned to in_progress
      responses:
        '200': { $ref: '#/components/responses/Updated' }
        '409': { $ref: '#/components/responses/Conflict' }

  /production/runs/{id}/actuals:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post:
      tags: [Production]
      summary: Log actual output + per-resource consumption (computes wastage + variance + flags)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActualsRequest' }
      responses:
        '200':
          description: Computed wastage
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:              { type: integer }
                  wastage_pct:     { type: number }
                  wastage_flagged: { type: boolean }

  /production/runs/{id}/dilution:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post:
      tags: [Production]
      summary: Add a post-mix dilution adjustment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DilutionRequest' }
      responses:
        '200':
          description: Updated totals
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:                { type: integer }
                  dilution_total_kg: { type: number }
                  dilution_flagged:  { type: boolean }

  /production/runs/{id}/packaging:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post:
      tags: [Production]
      summary: Split output into finished_paint_packs (+ stash residue)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PackagingRequest' }
      responses:
        '200':
          description: Packs created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:            { type: integer }
                  packs_created: { type: integer }
                  stash_kg:      { type: number }

  /production/runs/{id}/complete:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post: { tags: [Production], summary: Mark run completed, responses: { '200': { $ref: '#/components/responses/Updated' }, '409': { $ref: '#/components/responses/Conflict' } } }

  /production/runs/{id}/cancel:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post: { tags: [Production], summary: Cancel run, responses: { '200': { $ref: '#/components/responses/Updated' }, '409': { $ref: '#/components/responses/Conflict' } } }

  /production/packs/{packId}/ready:
    parameters:
      - { in: path, name: packId, required: true, schema: { type: integer, minimum: 1 } }
    post:
      tags: [Production]
      summary: Mark a pack ready_for_shipment
      responses:
        '200': { $ref: '#/components/responses/Updated' }
        '409': { $ref: '#/components/responses/Conflict' }

  /production/stash/{variantId}/repackage:
    parameters:
      - { in: path, name: variantId, required: true, schema: { type: integer, minimum: 1 } }
    post:
      tags: [Production]
      summary: Repackage variant stash into smaller packs
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RepackageRequest' }
      responses:
        '200':
          description: Repackaged
          content:
            application/json:
              schema:
                type: object
                properties:
                  variant_id:    { type: integer }
                  packs_created: { type: integer }

  /production/summary:
    get:
      tags: [Production]
      summary: Run counts by status + flagged-runs total
      responses:
        '200': { description: Summary, content: { application/json: { schema: { $ref: '#/components/schemas/ProductionSummary' } } } }

  # ---------- Sales ----------
  /sales/orders:
    get:
      tags: [Sales]
      summary: List customer orders (visibility-gated on financials)
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - { in: query, name: status, schema: { $ref: '#/components/schemas/OrderStatus' } }
        - { in: query, name: customer_id, schema: { type: integer, minimum: 1 } }
      responses:
        '200':
          description: Page of orders
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    properties:
                      items: { type: array, items: { $ref: '#/components/schemas/CustomerOrderListItem' } }
    post:
      tags: [Sales]
      summary: Create a draft customer order
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOrderRequest' }
      responses:
        '201': { $ref: '#/components/responses/Created' }

  /sales/orders/{id}:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    get:
      tags: [Sales]
      summary: Order detail
      responses:
        '200': { description: Order, content: { application/json: { schema: { $ref: '#/components/schemas/CustomerOrder' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Sales]
      summary: Edit header
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PatchOrderRequest' }
      responses:
        '200': { $ref: '#/components/responses/Updated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /sales/orders/{id}/submit:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post: { tags: [Sales], summary: 'draft → pending_approval', responses: { '200': { $ref: '#/components/responses/Updated' }, '409': { $ref: '#/components/responses/Conflict' } } }

  /sales/orders/{id}/approve:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post: { tags: [Sales], summary: 'pending_approval → approved (Manager)', responses: { '200': { $ref: '#/components/responses/Updated' }, '409': { $ref: '#/components/responses/Conflict' } } }

  /sales/orders/{id}/cancel:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post: { tags: [Sales], summary: Cancel order, responses: { '200': { $ref: '#/components/responses/Updated' }, '403': { $ref: '#/components/responses/Forbidden' }, '409': { $ref: '#/components/responses/Conflict' } } }

  /sales/orders/{id}/confirmation:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post:
      tags: [Sales]
      summary: Generate the next Order Confirmation version
      responses:
        '200':
          description: Confirmation
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderConfirmation' }

  /sales/orders/{id}/cost-to-build:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    get:
      tags: [Sales]
      summary: Live cost-to-build per line (drafting helper)
      responses:
        '200':
          description: Per-line cost
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/CostToBuildLine' } }

  /sales/orders/{id}/sale:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post:
      tags: [Sales]
      summary: Log a sale + sale_items + assigned packs
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSaleRequest' }
      responses:
        '201': { $ref: '#/components/responses/Created' }
        '409': { $ref: '#/components/responses/Conflict' }

  /sales/transactions:
    get:
      tags: [Sales]
      summary: List sales (visibility-gated)
      responses:
        '200':
          description: Sales
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/SaleListItem' } }

  /sales/transactions/{id}:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    get:
      tags: [Sales]
      summary: Sale detail with payments + status
      responses:
        '200': { description: Sale, content: { application/json: { schema: { $ref: '#/components/schemas/Sale' } } } }
        '404': { $ref: '#/components/responses/NotFound' }

  /sales/transactions/{id}/payments:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post:
      tags: [Sales]
      summary: Record a payment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePaymentRequest' }
      responses:
        '201': { $ref: '#/components/responses/Created' }
        '404': { $ref: '#/components/responses/NotFound' }

  /sales/transactions/{saleId}/returns:
    parameters:
      - { in: path, name: saleId, required: true, schema: { type: integer, minimum: 1 } }
    post:
      tags: [Sales]
      summary: Record a return + optional refund (Manager)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateReturnRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReturnResponse' }

  /sales/refunds/{id}/approve:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post: { tags: [Sales], summary: Approve refund (Manager), responses: { '200': { $ref: '#/components/responses/Updated' }, '409': { $ref: '#/components/responses/Conflict' } } }

  /sales/refunds/{id}/reject:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post:
      tags: [Sales]
      summary: Reject refund (Manager)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RejectRefundRequest' }
      responses:
        '200': { $ref: '#/components/responses/Updated' }
        '409': { $ref: '#/components/responses/Conflict' }

  /sales/refunds/{id}/payouts:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post:
      tags: [Sales]
      summary: Record a refund payout (Manager)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefundPayoutRequest' }
      responses:
        '201':
          description: Recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  refund_id: { type: integer }

  # ---------- Inventory ----------
  /inventory/finished:
    get:
      tags: [Inventory]
      summary: Finished-paint inventory grouped by variant + pack_size + status
      parameters:
        - { in: query, name: variant_id, schema: { type: integer, minimum: 1 } }
        - { in: query, name: status, schema: { $ref: '#/components/schemas/PackStatus' } }
      responses:
        '200':
          description: Inventory rows
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/FinishedInventoryGroup' } }

  /inventory/finished/by-variant/{variantId}:
    parameters:
      - { in: path, name: variantId, required: true, schema: { type: integer, minimum: 1 } }
    get:
      tags: [Inventory]
      summary: Per-pack rows for one variant
      responses:
        '200':
          description: Packs
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/FinishedPackRow' } }

  /inventory/finished/stash:
    get:
      tags: [Inventory]
      summary: Per-variant stash residue
      responses:
        '200':
          description: Stash entries
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/StashEntry' } }

  /inventory/resources:
    get:
      tags: [Inventory]
      summary: Resource stock with low-stock flag
      parameters:
        - { in: query, name: low_stock_only, schema: { type: boolean } }
      responses:
        '200':
          description: Resources
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/ResourceInventoryRow' } }

  # ---------- Dashboard ----------
  /api/dashboard:
    get:
      tags: [Dashboard]
      summary: Counts + pull-out lists for the home dashboard
      responses:
        '200':
          description: Dashboard snapshot
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardResponse' }

  # ---------- Reports ----------
  /api/losses:
    get:
      tags: [Reports]
      summary: Production Irregularity Report (Manager)
      parameters:
        - { in: query, name: from, schema: { type: string, format: date } }
        - { in: query, name: to, schema: { type: string, format: date } }
        - { in: query, name: variant_id, schema: { type: integer, minimum: 1 } }
        - { in: query, name: operator_id, schema: { type: integer, minimum: 1 } }
      responses:
        '200':
          description: Flagged runs
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/IrregularityReportRow' } }

  /api/losses/operator-summary:
    get:
      tags: [Reports]
      summary: Per-operator flagged-run totals (Manager)
      parameters:
        - { in: query, name: from, schema: { type: string, format: date } }
        - { in: query, name: to, schema: { type: string, format: date } }
      responses:
        '200':
          description: Summary rows
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/OperatorSummaryRow' } }
