openapi: 3.1.0
info:
  title: Paints App API
  version: 1.0.0
  description: |
    Backend API for the **Paint Production & Inventory App** (spec:
    `doc/pr-1_spec.md`). This document is the single source of truth for
    request/response shapes — `openapi-typescript` generates
    `src/types/openapi.gen.ts` from it, and Scalar renders it at `/docs`.
servers:
  - url: http://localhost:3000
    description: Local dev
  - url: https://service-dev.beautyflexinks.com
    description: Dev environment
  - url: https://service.beautyflexinks.com
    description: Production

tags:
  - name: Auth
  - name: Users
  - name: Paints
  - name: Formulas
  - name: Resources
  - name: Customers
  - name: Suppliers
  - name: Settings
  - name: Purchase Orders
  - name: Production
  - name: Sales
  - name: Inventory
  - name: Dashboard
  - name: Reports

security:
  - bearerAuth: []

# ============================================================================
# Components
# ============================================================================

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: ES256-signed JWT issued by `POST /auth/login`.

  parameters:
    Id:
      in: path
      name: id
      required: true
      schema: { type: integer, minimum: 1 }
    Page:
      in: query
      name: page
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      in: query
      name: page_size
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    Search:
      in: query
      name: search
      schema: { type: string, maxLength: 100 }
    IncludeArchived:
      in: query
      name: include_archived
      schema: { type: boolean, default: false }

  responses:
    Created:
      description: Resource created
      content:
        application/json:
          schema: { $ref: '#/components/schemas/IdRef' }
    Updated:
      description: Resource updated
      content:
        application/json:
          schema: { $ref: '#/components/schemas/IdRef' }
    NoContent:
      description: Empty success response
    BadRequest:
      description: Validation failure or unknown FK
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Authenticated but not permitted (role / device gate)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: No matching resource
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: State machine violation or duplicate key
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    InternalError:
      description: Unhandled server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:
    # ---------- enums (mirror sql/ddl.sql) ----------
    UserRole:        { type: string, enum: [manager, operator, sales] }
    DeviceStatus:    { type: string, enum: [pending, approved, rejected] }
    Classification:  { type: string, enum: [oil_based, water_based] }
    InkSeries:       { type: string, enum: [LCS, STD, OPQ_JS] }
    PoStatus:        { type: string, enum: [draft, ordered, shipped, received, cancelled] }
    PoLineKind:      { type: string, enum: [resource, finished_paint] }
    OrderStatus:
      type: string
      enum: [draft, pending_approval, approved, in_production, ready_for_shipment, shipped, completed, cancelled]
    PaymentTerms:    { type: string, enum: [prepaid, cod, net] }
    PaymentMethod:   { type: string, enum: [cash, bank_transfer, upi, cheque, card, other] }
    PackSource:      { type: string, enum: [produced, supplier] }
    PackStatus:      { type: string, enum: [in_stock, ready_for_shipment, shipped, sold, lost, returned] }
    ProductionRequestStatus:
      type: string
      enum: [pending, in_production, completed, cancelled]
    ProductionRunStatus:
      type: string
      enum: [planned, in_progress, completed, cancelled]
    ReturnCondition:   { type: string, enum: [good, damaged, expired, other] }
    ReturnDisposition: { type: string, enum: [re_inventory, lost] }
    RefundStatus:      { type: string, enum: [pending_approval, approved, rejected, paid_out, n_a] }
    StashTxnAction:    { type: string, enum: [added, consumed, repackaged, manual_adjustment] }
    Currency:          { type: string, pattern: '^[A-Z]{3}$', maxLength: 3, examples: [INR] }

    # ---------- shared helpers ----------
    IdRef:
      type: object
      required: [id]
      properties: { id: { type: integer } }

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:   { type: string, examples: [Bad Request] }
        message: { type: string }
        code:    { type: string, description: 'Optional machine code (e.g. device_pending_approval)' }
        details: { type: array, items: { type: object } }

    Page:
      type: object
      required: [items, total, page, page_size]
      properties:
        items:     { type: array, items: { type: object } }
        total:     { type: integer }
        page:      { type: integer }
        page_size: { type: integer }

    # ---------- auth / users ----------
    LoginRequest:
      type: object
      required: [identifier, password, clientId]
      properties:
        identifier: { type: string, minLength: 1, description: Email address or username }
        password:   { type: string, minLength: 1 }
        clientId:   { type: string, format: uuid, description: 'Random UUID generated and stored client-side (spec §2.2)' }

    LoginResponse:
      type: object
      required: [token]
      properties:
        token: { type: string, description: ES256 JWT (24h expiry) }

    PublicKeyResponse:
      type: object
      required: [algorithm, publicKey]
      properties:
        algorithm: { type: string, examples: [ES256] }
        publicKey: { type: string, description: PEM-formatted public key }

    User:
      type: object
      required: [id, username, role, is_active]
      properties:
        id:         { type: integer }
        username:   { type: string }
        email:      { type: [string, 'null'], format: email }
        role:       { $ref: '#/components/schemas/UserRole' }
        is_active:  { type: boolean }
        last_login: { type: [string, 'null'], format: date-time }
        created_at: { type: string, format: date-time }

    CreateUserRequest:
      type: object
      required: [username, email, password, role]
      properties:
        username: { type: string }
        email:    { type: string, format: email }
        password: { type: string, minLength: 6 }
        role:     { $ref: '#/components/schemas/UserRole' }

    PatchUserRequest:
      type: object
      properties:
        username:  { type: string }
        email:     { type: string, format: email }
        role:      { $ref: '#/components/schemas/UserRole' }
        password:  { type: string, minLength: 6 }
        is_active: { type: boolean }

    UsersSummary:
      type: object
      properties:
        total_users: { type: integer }
        managers:    { type: integer }
        operators:   { type: integer }
        sales:       { type: integer }

    DeviceRequest:
      type: object
      required: [id, user, status]
      properties:
        id:           { type: integer }
        user:         { type: string }
        device:       { type: [string, 'null'] }
        last_seen_ip: { type: [string, 'null'] }
        requested_at: { type: string, format: date-time }
        status:       { $ref: '#/components/schemas/DeviceStatus' }

    # ---------- paints ----------
    PaintVariantSummary:
      type: object
      required: [id, classification, ink_series]
      properties:
        id:             { type: integer }
        classification: { $ref: '#/components/schemas/Classification' }
        ink_series:     { $ref: '#/components/schemas/InkSeries' }
        archived_at:    { type: [string, 'null'], format: date-time }

    PaintListItem:
      type: object
      required: [id, name]
      properties:
        id:              { type: integer }
        name:            { type: string }
        swatch:          { type: [string, 'null'] }
        notes:           { type: [string, 'null'] }
        hsn_code:        { type: [string, 'null'] }
        product_code:    { type: [string, 'null'] }
        tags:            { type: array, items: { type: string } }
        classifications: { type: array, items: { $ref: '#/components/schemas/Classification' } }
        ink_series:      { type: array, items: { $ref: '#/components/schemas/InkSeries' } }
        variant_count:   { type: [integer, string] }
        archived_at:     { type: [string, 'null'], format: date-time }
        created_at:      { type: string, format: date-time }
        updated_at:      { type: string, format: date-time }

    Paint:
      allOf:
        - $ref: '#/components/schemas/PaintListItem'
        - type: object
          properties:
            variants: { type: array, items: { $ref: '#/components/schemas/PaintVariantSummary' } }

    CreatePaintRequest:
      type: object
      required: [name, classifications, ink_series]
      properties:
        name:            { type: string, minLength: 1, maxLength: 255 }
        swatch:          { type: string, maxLength: 50 }
        notes:           { type: string }
        hsn_code:        { type: string, maxLength: 50 }
        product_code:    { type: string, maxLength: 50 }
        tags:            { type: array, items: { type: string, maxLength: 50 }, maxItems: 32 }
        classifications: { type: array, items: { $ref: '#/components/schemas/Classification' }, minItems: 1, maxItems: 2, uniqueItems: true }
        ink_series:      { type: array, items: { $ref: '#/components/schemas/InkSeries' },      minItems: 1, maxItems: 3, uniqueItems: true }

    PatchPaintRequest:
      type: object
      properties:
        name:         { type: string, minLength: 1, maxLength: 255 }
        swatch:       { type: string, maxLength: 50 }
        notes:        { type: string }
        hsn_code:     { type: string, maxLength: 50 }
        product_code: { type: string, maxLength: 50 }
        tags:         { type: array, items: { type: string, maxLength: 50 }, maxItems: 32 }

    AddVariantsRequest:
      type: object
      required: [classifications, ink_series]
      properties:
        classifications: { type: array, items: { $ref: '#/components/schemas/Classification' }, minItems: 1, maxItems: 2, uniqueItems: true }
        ink_series:      { type: array, items: { $ref: '#/components/schemas/InkSeries' },      minItems: 1, maxItems: 3, uniqueItems: true }

    Variant:
      type: object
      required: [id, paint_id, classification, ink_series, paint_name]
      properties:
        id:             { type: integer }
        paint_id:       { type: integer }
        classification: { $ref: '#/components/schemas/Classification' }
        ink_series:     { $ref: '#/components/schemas/InkSeries' }
        archived_at:    { type: [string, 'null'], format: date-time }
        paint_name:     { type: string }
        hsn_code:       { type: [string, 'null'] }
        product_code:   { type: [string, 'null'] }
        swatch:         { type: [string, 'null'] }

    # ---------- formulas ----------
    FormulaIngredient:
      type: object
      required: [resource_id, quantity_kg]
      properties:
        resource_id:   { type: integer }
        resource_name: { type: string }
        quantity_kg:   { type: [number, string] }

    FormulaListItem:
      type: object
      required: [id, variant_id, name, standard_output_kg]
      properties:
        id:                              { type: integer }
        variant_id:                      { type: integer }
        paint_id:                        { type: integer }
        paint_name:                      { type: string }
        classification:                  { $ref: '#/components/schemas/Classification' }
        ink_series:                      { $ref: '#/components/schemas/InkSeries' }
        name:                            { type: string }
        notes:                           { type: [string, 'null'] }
        standard_output_kg:              { type: [number, string] }
        is_default:                      { type: boolean }
        wastage_threshold_pct:           { type: [number, string, 'null'] }
        resource_variance_threshold_pct: { type: [number, string, 'null'] }
        dilution_threshold_pct:          { type: [number, string, 'null'] }
        archived_at:                     { type: [string, 'null'], format: date-time }
        created_at:                      { type: string, format: date-time }
        updated_at:                      { type: string, format: date-time }

    Formula:
      allOf:
        - $ref: '#/components/schemas/FormulaListItem'
        - type: object
          properties:
            ingredients: { type: array, items: { $ref: '#/components/schemas/FormulaIngredient' } }

    CreateFormulaRequest:
      type: object
      required: [variant_id, name, standard_output_kg, ingredients]
      properties:
        variant_id:                      { type: integer, minimum: 1 }
        name:                            { type: string, minLength: 1, maxLength: 255 }
        notes:                           { type: string }
        standard_output_kg:              { type: number, exclusiveMinimum: 0 }
        is_default:                      { type: boolean }
        wastage_threshold_pct:           { type: number, minimum: 0 }
        resource_variance_threshold_pct: { type: number, minimum: 0 }
        dilution_threshold_pct:          { type: number, minimum: 0 }
        ingredients:
          type: array
          minItems: 1
          maxItems: 200
          items:
            type: object
            required: [resource_id, quantity_kg]
            properties:
              resource_id: { type: integer, minimum: 1 }
              quantity_kg: { type: number, exclusiveMinimum: 0 }

    PatchFormulaRequest:
      type: object
      properties:
        name:                            { type: string, minLength: 1, maxLength: 255 }
        notes:                           { type: string }
        standard_output_kg:              { type: number, exclusiveMinimum: 0 }
        wastage_threshold_pct:           { type: [number, 'null'], minimum: 0 }
        resource_variance_threshold_pct: { type: [number, 'null'], minimum: 0 }
        dilution_threshold_pct:          { type: [number, 'null'], minimum: 0 }

    CopyFormulaRequest:
      type: object
      properties:
        variant_id: { type: integer, minimum: 1 }
        name:       { type: string, minLength: 1, maxLength: 255 }

    ReplaceIngredientsRequest:
      type: object
      required: [ingredients]
      properties:
        ingredients:
          type: array
          minItems: 1
          maxItems: 200
          items:
            type: object
            required: [resource_id, quantity_kg]
            properties:
              resource_id: { type: integer, minimum: 1 }
              quantity_kg: { type: number, exclusiveMinimum: 0 }

    # ---------- resources ----------
    ResourceTxnType: { type: string, enum: [po_receipt, production_consumption, dilution_consumption, manual_adjustment] }

    ResourceTransaction:
      type: object
      required: [id, txn_type, quantity_kg, created_at]
      properties:
        id:               { type: [integer, string] }
        txn_type:         { $ref: '#/components/schemas/ResourceTxnType' }
        quantity_kg:      { type: [number, string] }
        unit_cost_per_kg: { type: [number, string, 'null'] }
        reference_type:   { type: [string, 'null'] }
        reference_id:     { type: [integer, string, 'null'] }
        notes:            { type: [string, 'null'] }
        created_at:       { type: string, format: date-time }

    ResourceListItem:
      type: object
      required: [id, name]
      properties:
        id:                       { type: integer }
        name:                     { type: string }
        description:              { type: [string, 'null'] }
        aliases:                  { type: array, items: { type: string } }
        import_source:            { type: [string, 'null'] }
        current_stock_kg:         { type: [number, string] }
        weighted_avg_cost_per_kg: { type: [number, string] }
        low_stock_threshold_kg:   { type: [number, string, 'null'] }
        archived_at:              { type: [string, 'null'], format: date-time }
        created_at:               { type: string, format: date-time }
        updated_at:               { type: string, format: date-time }

    Resource:
      allOf:
        - $ref: '#/components/schemas/ResourceListItem'
        - type: object
          properties:
            recent_transactions:
              type: array
              items: { $ref: '#/components/schemas/ResourceTransaction' }

    CreateResourceRequest:
      type: object
      required: [name]
      properties:
        name:                   { type: string, minLength: 1, maxLength: 255 }
        description:            { type: string }
        aliases:                { type: array, items: { type: string, maxLength: 100 }, maxItems: 32 }
        import_source:          { type: string, maxLength: 255 }
        low_stock_threshold_kg: { type: number, minimum: 0 }

    PatchResourceRequest:
      type: object
      properties:
        name:                   { type: string, minLength: 1, maxLength: 255 }
        description:            { type: string }
        aliases:                { type: array, items: { type: string, maxLength: 100 }, maxItems: 32 }
        import_source:          { type: string, maxLength: 255 }
        low_stock_threshold_kg: { type: [number, 'null'], minimum: 0 }

    # ---------- customers ----------
    ShippingAddress:
      type: object
      required: [id, label, address, is_default]
      properties:
        id:         { type: integer }
        label:      { type: string }
        address:    { type: string }
        is_default: { type: boolean }

    CustomerListItem:
      type: object
      required: [id, name]
      properties:
        id:               { type: integer }
        name:             { type: string }
        contact_name:     { type: [string, 'null'] }
        contact_phone:    { type: [string, 'null'] }
        contact_email:    { type: [string, 'null'] }
        gst_number:       { type: [string, 'null'] }
        default_currency: { $ref: '#/components/schemas/Currency' }
        archived_at:      { type: [string, 'null'], format: date-time }
        created_at:       { type: string, format: date-time }

    Customer:
      allOf:
        - $ref: '#/components/schemas/CustomerListItem'
        - type: object
          properties:
            billing_address:    { type: [string, 'null'] }
            notes:              { type: [string, 'null'] }
            updated_at:         { type: string, format: date-time }
            shipping_addresses: { type: array, items: { $ref: '#/components/schemas/ShippingAddress' } }

    CreateCustomerRequest:
      type: object
      required: [name]
      properties:
        name:             { type: string, minLength: 1, maxLength: 255 }
        contact_name:     { type: string, maxLength: 255 }
        contact_phone:    { type: string, maxLength: 50 }
        contact_email:    { type: string, format: email, maxLength: 255 }
        billing_address:  { type: string }
        gst_number:       { type: string, maxLength: 20 }
        default_currency: { $ref: '#/components/schemas/Currency' }
        notes:            { type: string }

    PatchCustomerRequest:
      type: object
      properties:
        name:             { type: string, minLength: 1, maxLength: 255 }
        contact_name:     { type: string, maxLength: 255 }
        contact_phone:    { type: string, maxLength: 50 }
        contact_email:    { type: string, format: email, maxLength: 255 }
        billing_address:  { type: string }
        gst_number:       { type: [string, 'null'], maxLength: 20 }
        default_currency: { $ref: '#/components/schemas/Currency' }
        notes:            { type: string }

    ShippingAddressRequest:
      type: object
      required: [label, address]
      properties:
        label:      { type: string, minLength: 1, maxLength: 100 }
        address:    { type: string, minLength: 1 }
        is_default: { type: boolean }

    PatchShippingAddressRequest:
      type: object
      properties:
        label:      { type: string, minLength: 1, maxLength: 100 }
        address:    { type: string, minLength: 1 }
        is_default: { type: boolean }

    # ---------- suppliers ----------
    SupplierPOC:
      type: object
      required: [name]
      properties:
        name:  { type: string, minLength: 1, maxLength: 255 }
        email: { type: string, format: email, maxLength: 255 }
        phone: { type: string, maxLength: 50 }
        role:  { type: string, maxLength: 100 }

    SupplierListItem:
      type: object
      required: [id, name]
      properties:
        id:           { type: integer }
        name:         { type: string }
        contact_name: { type: [string, 'null'] }
        email:        { type: [string, 'null'] }
        phone:        { type: [string, 'null'] }
        gst_number:   { type: [string, 'null'] }
        archived_at:  { type: [string, 'null'], format: date-time }
        created_at:   { type: string, format: date-time }

    Supplier:
      allOf:
        - $ref: '#/components/schemas/SupplierListItem'
        - type: object
          properties:
            address:    { type: [string, 'null'] }
            website:    { type: [string, 'null'] }
            pocs:       { type: array, items: { $ref: '#/components/schemas/SupplierPOC' } }
            notes:      { type: [string, 'null'] }
            updated_at: { type: string, format: date-time }

    CreateSupplierRequest:
      type: object
      required: [name]
      properties:
        name:         { type: string, minLength: 1, maxLength: 255 }
        contact_name: { type: string, maxLength: 255 }
        email:        { type: string, format: email, maxLength: 255 }
        phone:        { type: string, maxLength: 50 }
        address:      { type: string }
        website:      { type: string, maxLength: 255 }
        gst_number:   { type: string, maxLength: 20 }
        pocs:         { type: array, items: { $ref: '#/components/schemas/SupplierPOC' }, maxItems: 32 }
        notes:        { type: string }

    PatchSupplierRequest:
      $ref: '#/components/schemas/CreateSupplierRequest'

    # ---------- settings + pack sizes ----------
    SettingEntry:
      type: object
      required: [value, source]
      properties:
        value:      {}
        source:     { type: string, enum: [configured, default] }
        updated_at: { type: [string, 'null'], format: date-time }
        updated_by: { type: [integer, 'null'] }

    UpsertSettingRequest:
      type: object
      required: [value]
      properties:
        value: {}

    PackSize:
      type: object
      required: [pack_size_kg, is_active]
      properties:
        pack_size_kg: { type: [number, string] }
        is_active:    { type: boolean }
        created_at:   { type: string, format: date-time }

    # ---------- purchase orders ----------
    PurchaseOrderItem:
      type: object
      required: [id, kind, landed_cost_per_kg]
      properties:
        id:                   { type: integer }
        kind:                 { $ref: '#/components/schemas/PoLineKind' }
        resource_id:          { type: [integer, 'null'] }
        resource_name:        { type: [string, 'null'] }
        variant_id:           { type: [integer, 'null'] }
        paint_name:           { type: [string, 'null'] }
        classification:       { oneOf: [ { $ref: '#/components/schemas/Classification' }, { type: 'null' } ] }
        ink_series:           { oneOf: [ { $ref: '#/components/schemas/InkSeries' }, { type: 'null' } ] }
        pack_size_kg:         { type: [number, string, 'null'] }
        quantity_kg:          { type: [number, string, 'null'] }
        quantity_packs:       { type: [integer, 'null'] }
        landed_cost_per_kg:   { type: [number, string] }
        received_quantity_kg: { type: [number, string] }
        received_packs:       { type: [integer, string] }

    PurchaseOrderListItem:
      type: object
      required: [id, supplier_id, status, currency]
      properties:
        id:            { type: integer }
        supplier_id:   { type: integer }
        supplier_name: { type: string }
        status:        { $ref: '#/components/schemas/PoStatus' }
        currency:      { $ref: '#/components/schemas/Currency' }
        notes:         { type: [string, 'null'] }
        ordered_at:    { type: [string, 'null'], format: date-time }
        shipped_at:    { type: [string, 'null'], format: date-time }
        received_at:   { type: [string, 'null'], format: date-time }
        archived_at:   { type: [string, 'null'], format: date-time }
        created_at:    { type: string, format: date-time }
        total_cost:    { type: [number, string] }
        item_count:    { type: [integer, string] }

    PurchaseOrder:
      allOf:
        - $ref: '#/components/schemas/PurchaseOrderListItem'
        - type: object
          properties:
            share_token: { type: string, format: uuid }
            updated_at:  { type: string, format: date-time }
            items:       { type: array, items: { $ref: '#/components/schemas/PurchaseOrderItem' } }

    POItemInput:
      type: object
      required: [kind, landed_cost_per_kg]
      properties:
        kind:               { $ref: '#/components/schemas/PoLineKind' }
        resource_id:        { type: integer, minimum: 1 }
        variant_id:         { type: integer, minimum: 1 }
        pack_size_kg:       { type: number, exclusiveMinimum: 0 }
        quantity_kg:        { type: number, exclusiveMinimum: 0 }
        quantity_packs:     { type: integer, exclusiveMinimum: 0 }
        landed_cost_per_kg: { type: number, minimum: 0 }

    CreatePORequest:
      type: object
      required: [supplier_id, items]
      properties:
        supplier_id: { type: integer, minimum: 1 }
        currency:    { $ref: '#/components/schemas/Currency' }
        notes:       { type: string }
        items:       { type: array, minItems: 1, maxItems: 200, items: { $ref: '#/components/schemas/POItemInput' } }

    PatchPORequest:
      type: object
      properties:
        currency: { $ref: '#/components/schemas/Currency' }
        notes:    { type: string }

    PatchPOItemRequest:
      type: object
      properties:
        pack_size_kg:       { type: number, exclusiveMinimum: 0 }
        quantity_kg:        { type: number, exclusiveMinimum: 0 }
        quantity_packs:     { type: integer, exclusiveMinimum: 0 }
        landed_cost_per_kg: { type: number, minimum: 0 }

    TransitionPORequest:
      type: object
      required: [to]
      properties:
        to: { type: string, enum: [ordered, shipped, cancelled] }

    ReceivePORequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 200
          items:
            type: object
            required: [id]
            properties:
              id:                   { type: integer, minimum: 1 }
              received_quantity_kg: { type: number, exclusiveMinimum: 0 }
              received_packs:       { type: integer, exclusiveMinimum: 0 }

    # ---------- production ----------
    ProductionRequest:
      type: object
      required: [id, variant_id, pack_size_kg, quantity_packs, origin, status]
      properties:
        id:             { type: integer }
        variant_id:     { type: integer }
        pack_size_kg:   { type: [number, string] }
        quantity_packs: { type: integer }
        origin:         { type: string, enum: [customer_order, demand_suggestion] }
        order_item_id:  { type: [integer, 'null'] }
        status:         { $ref: '#/components/schemas/ProductionRequestStatus' }
        notes:          { type: [string, 'null'] }
        created_at:     { type: string, format: date-time }
        paint_name:     { type: string }
        classification: { $ref: '#/components/schemas/Classification' }
        ink_series:     { $ref: '#/components/schemas/InkSeries' }

    CreateProductionRequestRequest:
      type: object
      required: [variant_id, pack_size_kg, quantity_packs]
      properties:
        variant_id:     { type: integer, minimum: 1 }
        pack_size_kg:   { type: number, exclusiveMinimum: 0 }
        quantity_packs: { type: integer, exclusiveMinimum: 0 }
        notes:          { type: string }

    ProductionRunListItem:
      type: object
      required: [id, batch_number, variant_id, formula_id, status]
      properties:
        id:                 { type: integer }
        batch_number:       { type: string }
        variant_id:         { type: integer }
        formula_id:         { type: integer }
        status:             { $ref: '#/components/schemas/ProductionRunStatus' }
        expected_output_kg: { type: [number, string] }
        actual_output_kg:   { type: [number, string, 'null'] }
        wastage_pct:        { type: [number, string, 'null'] }
        wastage_flagged:    { type: boolean }
        dilution_total_kg:  { type: [number, string] }
        dilution_flagged:   { type: boolean }
        started_at:         { type: [string, 'null'], format: date-time }
        completed_at:       { type: [string, 'null'], format: date-time }
        created_at:         { type: string, format: date-time }
        operator:           { type: string }
        paint_name:         { type: string }
        classification:     { $ref: '#/components/schemas/Classification' }
        ink_series:         { $ref: '#/components/schemas/InkSeries' }

    ResourceActual:
      type: object
      required: [resource_id, expected_kg, actual_kg, flagged]
      properties:
        resource_id:   { type: integer }
        resource_name: { type: string }
        expected_kg:   { type: [number, string] }
        actual_kg:     { type: [number, string] }
        variance_pct:  { type: [number, string, 'null'] }
        flagged:       { type: boolean }

    DilutionAdjustment:
      type: object
      required: [id, resource_id, kg_added]
      properties:
        id:            { type: integer }
        resource_id:   { type: integer }
        resource_name: { type: string }
        kg_added:      { type: [number, string] }
        notes:         { type: [string, 'null'] }
        created_at:    { type: string, format: date-time }

    RunPackSummary:
      type: object
      properties:
        id:           { type: integer }
        pack_size_kg: { type: [number, string] }
        status:       { $ref: '#/components/schemas/PackStatus' }
        cost_per_kg:  { type: [number, string] }

    ProductionRun:
      allOf:
        - $ref: '#/components/schemas/ProductionRunListItem'
        - type: object
          properties:
            request_id:         { type: [integer, 'null'] }
            notes:              { type: [string, 'null'] }
            formula_name:       { type: string }
            standard_output_kg: { type: [number, string] }
            actuals:            { type: array, items: { $ref: '#/components/schemas/ResourceActual' } }
            dilution:           { type: array, items: { $ref: '#/components/schemas/DilutionAdjustment' } }
            packs:              { type: array, items: { $ref: '#/components/schemas/RunPackSummary' } }
            archived_at:        { type: [string, 'null'], format: date-time }
            archived_by:        { type: [integer, 'null'] }
            created_by:         { type: integer }
            updated_at:         { type: string, format: date-time }

    CreateRunRequest:
      type: object
      required: [variant_id, batch_number, expected_output_kg]
      properties:
        request_id:         { type: integer, minimum: 1 }
        variant_id:         { type: integer, minimum: 1 }
        formula_id:         { type: integer, minimum: 1, description: 'Default = variant''s is_default formula' }
        batch_number:       { type: string, minLength: 1, maxLength: 50 }
        expected_output_kg: { type: number, exclusiveMinimum: 0 }
        notes:              { type: string }

    ActualsRequest:
      type: object
      required: [actual_output_kg, resources]
      properties:
        actual_output_kg: { type: number, minimum: 0 }
        resources:
          type: array
          minItems: 1
          maxItems: 200
          items:
            type: object
            required: [resource_id, actual_kg]
            properties:
              resource_id: { type: integer, minimum: 1 }
              actual_kg:   { type: number, minimum: 0 }

    DilutionRequest:
      type: object
      required: [resource_id, kg_added]
      properties:
        resource_id: { type: integer, minimum: 1 }
        kg_added:    { type: number, exclusiveMinimum: 0 }
        notes:       { type: string }

    PackagingRequest:
      type: object
      required: [packs]
      properties:
        packs:
          type: array
          minItems: 0
          maxItems: 50
          items:
            type: object
            required: [pack_size_kg, units]
            properties:
              pack_size_kg: { type: number, exclusiveMinimum: 0 }
              units:        { type: integer, minimum: 1 }
              location:     { type: string, maxLength: 255 }
        stash_kg: { type: number, minimum: 0 }
        notes:    { type: string }

    RepackageRequest:
      type: object
      required: [pack_size_kg, units]
      properties:
        pack_size_kg: { type: number, exclusiveMinimum: 0 }
        units:        { type: integer, minimum: 1 }
        notes:        { type: string }

    ProductionSummary:
      type: object
      properties:
        by_status:
          type: array
          items:
            type: object
            properties:
