  # ---------- Settings ----------
  /settings:
    get:
      tags: [Settings]
      summary: All app settings merged with defaults
      responses:
        '200':
          description: Settings map
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/SettingEntry'

  /settings/{key}:
    parameters:
      - { in: path, name: key, required: true, schema: { type: string, pattern: '^[a-z][a-z0-9_.]*$' } }
    get:
      tags: [Settings]
      summary: One setting
      responses:
        '200':
          description: Setting
          content:
            application/json:
              schema:
                allOf:
                  - { type: object, properties: { key: { type: string } } }
                  - { $ref: '#/components/schemas/SettingEntry' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Settings]
      summary: Upsert a setting (Manager)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpsertSettingRequest' }
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                allOf:
                  - { type: object, properties: { key: { type: string } } }
                  - { $ref: '#/components/schemas/SettingEntry' }
    delete:
      tags: [Settings]
      summary: Reset to default (Manager)
      responses:
        '200':
          description: Reset
          content:
            application/json:
              schema:
                allOf:
                  - { type: object, properties: { key: { type: string } } }
                  - { $ref: '#/components/schemas/SettingEntry' }

